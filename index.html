<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Grid Designer - Vanilla JS Starter</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Grid Designer</h1>
			<p>Drag/drop to design grid layouts and export CSS.</p>
		</header>

		<section id="controls">

			<div id="responsiveSettings">
				<label>
					Main Max Width:
					<select id="mainMaxWidth">
						<option value="1536">Desktop (1536px)</option>
						<option value="1024">Tablet (1024px)</option>
						<option value="768">Mobile (768px)</option>
					</select>
				</label>

				<label>
					Columns (auto):
					<input id="colCount" type="number" min="1" max="24" />
				</label>

				<label>
					Rows:
					<input id="rowCount" type="number" value="4" min="1" max="20" />
				</label>
			</div>

			<div class="control-actions">
				<button id="buildGrid">Build Grid</button>
				<button id="clearGrid">Clear</button>
				<button id="savePattern">Save Pattern</button>
				<button id="deletePattern" style="display: none">Delete Pattern</button>
				<button id="exportCss">Export CSS</button>
			</div>
		</section>

		<div id="resolutionTabs"></div>

		<section id="elements">

			<div id="elementList"></div>
		</section>

		<section id="gridWrapper">
			<div id="grid" class="grid"></div>
		</section>

		<section id="output">
			<h2>Generated CSS</h2>
			<pre id="cssCode"></pre>
		</section>

		<script src="script.js"></script>
	</body>
</html>
