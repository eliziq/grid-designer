<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Grid Designer - Vanilla JS Starter</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Grid Designer</h1>
			<p>Drag/drop to design grid layouts and export CSS.</p>
		</header>

		<section id="controls">
			<label>
				Container id:
				<input id="containerId" type="string" />
				Enter container id before you build a grid
			</label>

			<div id="responsiveSettings">
				<label>
					Main Max Width:
					<select id="mainMaxWidth">
						<option value="1536">Desktop (1536px)</option>
						<option value="1024">Tablet (1024px)</option>
						<option value="768">Mobile (768px)</option>
					</select>
				</label>

				<label>
					Banner Width:
					<select id="bannerWidth">
						<option value="1">Full Width</option>
						<option value="0.67">2/3 Width</option>
						<option value="0.5">1/2 Width</option>
						<option value="0.33">1/3 Width</option>
					</select>
				</label>

				<label>
					Banner Height (px):
					<input id="bannerHeight" type="number" min="50" value="600" />
				</label>

				<label>
					Columns (auto):
					<input id="colCount" type="number" readonly />
				</label>

				<label>
					Rows:
					<input id="rowCount" type="number" value="4" min="1" max="20" />
				</label>
			</div>

			<div class="control-actions">
				<button id="buildGrid">Build Grid</button>
				<button id="clearGrid">Clear</button>
				<button id="exportCss">Export CSS</button>
			</div>
		</section>

		<section id="elements">
			<label for=""
				>Add element
				<input type="text" name="" id="elementName" />
				<button id="addElement">Add</button>
			</label>

			<div id="elementList"></div>
		</section>

		<section id="gridWrapper">
			<div id="grid" class="grid"></div>
		</section>

		<section id="output">
			<h2>Generated CSS</h2>
			<pre id="cssCode"></pre>
		</section>

		<script src="script.js"></script>
	</body>
</html>
