<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Grid Designer - Vanilla JS Starter</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header>
			<h1>Grid Designer</h1>
			<p>Drag/drop to design grid layouts and export CSS.</p>
		</header>
		<section id="controls">
			<div id="responsiveSettings">
				<label>
					Main Max Width:
					<select id="mainMaxWidth"></select>
				</label>

				<label>
					Columns:
					<input id="colCount" type="number" min="1" max="24" />
				</label>

				<label>
					Rows:
					<input id="rowCount" type="number" value="4" min="1" max="20" />
				</label>
			</div>

			<div class="control-actions">
				<button id="buildGrid">Build Grid</button>
				<button id="clearGrid">Clear</button>
				<button id="savePattern">Save Pattern</button>
				<button id="deletePattern" style="display: none">Delete Pattern</button>
				<button id="loadDesign">Load Design</button>
				<input type="file" id="importState" accept=".json" style="display: none" />
				<button id="exportCss">Export CSS</button>
				<button id="exportJson">Export JSON</button>
			</div>
		</section>

		<div id="resolutionTabs"></div>

		<section id="elements">
			<section id="tagSelectionPanel" class="tag-selector">
				<details id="tagSelectorDetails" class="tag-selector__details" open>
					<summary class="tag-selector__summary">
						<span class="tag-selector__title">Pick elements you want to add to the card</span>
						<span id="tagSelectorMeta" class="tag-selector__meta"></span>
					</summary>
					<div class="tag-selector__body">
						<div id="tagSelectorList" class="tag-selector__list"></div>
						<div class="tag-selector__actions">
							<button id="tagSelectionSave" type="button">Save selected tags</button>
							<button id="tagSelectionEdit" type="button" style="display:none">Edit selection</button>
						</div>
					</div>
				</details>
			</section>
			<div id="elementList"></div>
		</section>

		<section id="gridWrapper">
			<div id="grid" class="grid"></div>
		</section>

		<section id="rowControls">
			<h2>Row Heights</h2>
			<div id="controlsContainer"></div>
		</section>

		<section id="output">
			<h2>Generated CSS</h2>
			<pre id="cssCode"></pre>
		</section>

		<!-- <script src="script.js"></script> -->
		<script src="grid-designer-class.js"></script>
		<script src="grid-designer-state.js"></script>
		<script src="grid-designer-layout.js"></script>
		<script src="grid-designer-render.js"></script>
		<script src="grid-designer-interactions.js"></script>
		<script src="grid-designer-api.js"></script>
		<script src="use-script.js"></script>
	</body>
</html>
